  postgres-auth:
    image: postgres:17-alpine
    container_name: postgres_auth
    environment:
      POSTGRES_USER: DRAGON
      POSTGRES_PASSWORD: DRAGON
      POSTGRES_DB: ecommerce_auth
    ports:
      - "5432:5432"
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U DRAGON -d ecommerce_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

