  review_detail:
    image: review_detail-ecommerce-service:1.0
    container_name: review_detail-ecommerce
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
      - ./logs:/var/log/app
    networks:
      - app_ecommerce_network
    depends_on:
      postgres-review-detail:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-cluster-init:
        condition: service_started
    environment:
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092

  stats-reader:
    image: stats-reader-ecommerce-service:1.0
    container_name: stats-reader-ecommerce
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
      - ./logs:/var/log/app
    ports:
      - "50071:50071"
    networks:
      - app_ecommerce_network
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker

  stats-writer:
    image: stats-writer-ecommerce-service:1.0
    container_name: stats-writer-ecommerce
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
      - ./logs:/var/log/app
    networks:
      - app_ecommerce_network
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092

  # ============================================================
  # Kafka KRaft Cluster (3 Brokers, No Zookeeper)
  # ============================================================
  kafka-1:
    image: bitnami/kafka:3.7
    container_name: kafka-1-ecommerce
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_KRAFT_CLUSTER_ID=MicroEcomKraft01
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_1_data:/bitnami/kafka
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-2:
    image: bitnami/kafka:3.7
    container_name: kafka-2-ecommerce
    ports:
      - "9094:9092"
    environment:
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-2:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_KRAFT_CLUSTER_ID=MicroEcomKraft01
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_2_data:/bitnami/kafka
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-3:
    image: bitnami/kafka:3.7
    container_name: kafka-3-ecommerce
    ports:
      - "9096:9092"
    environment:
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-3:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_KRAFT_CLUSTER_ID=MicroEcomKraft01
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_3_data:/bitnami/kafka
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    networks:
      - app_ecommerce_network
    depends_on:
      kafka-1:
        condition: service_healthy
    command:
      - "--kafka.server=kafka-1:9092"
      - "--kafka.server=kafka-2:9092"
      - "--kafka.server=kafka-3:9092"
      - "--web.listen-address=0.0.0.0:9308"
      - "--log.level=debug"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9308/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Redis Cluster (3 Master + 3 Replica)
  # ============================================================
  redis-node-1:
    image: redis:7.4
    container_name: redis-node-1
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass dragon_knight
      --masterauth dragon_knight
    ports:
      - "6379:6379"
    volumes:
      - redis_node_1_data:/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dragon_knight", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-node-2:
    image: redis:7.4
    container_name: redis-node-2
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass dragon_knight
      --masterauth dragon_knight
    ports:
      - "6380:6379"
    volumes:
      - redis_node_2_data:/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dragon_knight", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-node-3:
    image: redis:7.4
    container_name: redis-node-3
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass dragon_knight
      --masterauth dragon_knight
    ports:
      - "6381:6379"
    volumes:
      - redis_node_3_data:/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dragon_knight", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-node-4:
    image: redis:7.4
    container_name: redis-node-4
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass dragon_knight
      --masterauth dragon_knight
    ports:
      - "6382:6379"
    volumes:
      - redis_node_4_data:/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dragon_knight", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-node-5:
    image: redis:7.4
    container_name: redis-node-5
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass dragon_knight
      --masterauth dragon_knight
    ports:
      - "6383:6379"
    volumes:
      - redis_node_5_data:/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dragon_knight", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-node-6:
    image: redis:7.4
    container_name: redis-node-6
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass dragon_knight
      --masterauth dragon_knight
    ports:
      - "6384:6379"
    volumes:
      - redis_node_6_data:/data
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dragon_knight", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-cluster-init:
    image: redis:7.4
    container_name: redis-cluster-init
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    entrypoint: []
    command: >
      bash -c "
        echo 'Creating Redis Cluster...' &&
        redis-cli -a dragon_knight --cluster create
          redis-node-1:6379
          redis-node-2:6379
          redis-node-3:6379
          redis-node-4:6379
          redis-node-5:6379
          redis-node-6:6379
          --cluster-replicas 1 --cluster-yes &&
        echo 'Redis Cluster created successfully'
      "
    networks:
      - app_ecommerce_network

  # ============================================================
  # Observability Stack
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ../../observability/rules:/etc/prometheus/rules
    networks:
      - app_ecommerce_network
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_ecommerce
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_ecommerce_storage:/var/lib/grafana
    networks:
      - app_ecommerce_network
    depends_on:
      - prometheus
      - jaeger
      - alertmanager
      - loki

  nginx:
    image: nginx:alpine
    container_name: nginx_ecommerce
    ports:
      - "80:80"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - apigateway
    networks:
      - app_ecommerce_network

  node-exporter:
    image: quay.io/prometheus/node-exporter
    container_name: node-exporter_ecommerce
    pid: "host"
    networks:
      - app_ecommerce_network
    volumes:
      - "/:/host:ro,rslave"
    command:
      - '--path.rootfs=/host'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-ecommerce
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../../observability/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8889:8889"
    networks:
      - app_ecommerce_network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger-ecommerce
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    networks:
      - app_ecommerce_network
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager_ecommerce
    volumes:
      - ../../observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - app_ecommerce_network

  loki:
    container_name: loki_ecommerce
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ../../observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_ecommerce_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app_ecommerce_network

  promtail:
    container_name: promtail_ecommerce
    image: grafana/promtail:2.9.0
    volumes:
      - ../../observability/promtail-config.yaml:/etc/promtail/config.yaml
      - ./logs:/var/log/app
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - app_ecommerce_network

# ============================================================
# Volumes
# ============================================================
volumes:
  # PostgreSQL per-service
  pg_auth_data:
  pg_role_data:
  pg_user_data:
  pg_category_data:
  pg_merchant_data:
  pg_merchant_award_data:
  pg_merchant_business_data:
  pg_merchant_detail_data:
  pg_merchant_policy_data:
  pg_order_data:
  pg_order_item_data:
  pg_product_data:
  pg_transaction_data:
  pg_cart_data:
  pg_review_data:
  pg_review_detail_data:
  pg_slider_data:
  pg_shipping_address_data:
  pg_banner_data:
  # ClickHouse
  clickhouse_data:
  clickhouse_logs:
  # Kafka KRaft
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  # Redis Cluster
  redis_node_1_data:
  redis_node_2_data:
  redis_node_3_data:
  redis_node_4_data:
  redis_node_5_data:
  redis_node_6_data:
  # Observability
  loki_ecommerce_data:
  grafana_ecommerce_storage:

networks:
  app_ecommerce_network:
    driver: bridge