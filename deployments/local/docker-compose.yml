      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092

  merchant_business:
    image: merchant_business-ecommerce-service:1.0
    container_name: merchant_business-ecommerce
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
      - ./logs:/var/log/app
    networks:
