  # ============================================================
  # Migration Service
  # ============================================================

  # ============================================================
  # ClickHouse (Stats Analytics)
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse_ecommerce
    ports:
      - "8123:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: ecommerce_stats
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks:
      - app_ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Application Services
  # ============================================================
  apigateway:
    image: apigateway-ecommerce-service:1.0
    container_name: apigateway-ecommerce
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
      - ./logs:/var/log/app
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - app_ecommerce_network
    depends_on:
      kafka-1:
        condition: service_healthy
      auth:
        condition: service_started
      role:
        condition: service_started
      user:
        condition: service_started
      category:
        condition: service_started
      merchant:
        condition: service_started
      order-item:
        condition: service_started
      order:
        condition: service_started
      product:
        condition: service_started
      transaction:
        condition: service_started
      cart:
        condition: service_started
      review:
        condition: service_started
      slider:
        condition: service_started
      shipping_address:
        condition: service_started
      banner:
        condition: service_started
      merchant_award:
        condition: service_started
      merchant_business:
        condition: service_started
      merchant_detail:
        condition: service_started
      merchant_policy:
        condition: service_started
      review_detail:
        condition: service_started
    environment:
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka-1:9092,kafka-2:9092,kafka-3:9092

  auth:
