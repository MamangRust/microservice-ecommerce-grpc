syntax = "proto3";

package pb;

import "transaction/transaction_common.proto";

option go_package = "github.com/MamangRust/microservice-ecommerce-shared/pb";

service TransactionStatsService {
    rpc GetMonthlyAmountSuccess(MonthAmountTransactionRequest) returns (ApiResponseTransactionMonthAmountSuccess);
    rpc GetYearlyAmountSuccess(YearAmountTransactionRequest) returns (ApiResponseTransactionYearAmountSuccess);
    rpc GetMonthlyAmountFailed(MonthAmountTransactionRequest) returns (ApiResponseTransactionMonthAmountFailed);
    rpc GetYearlyAmountFailed(YearAmountTransactionRequest) returns (ApiResponseTransactionYearAmountFailed);
    rpc GetMonthlyTransactionMethodSuccess(MonthMethodTransactionRequest) returns (ApiResponseTransactionMonthPaymentMethod);
    rpc GetYearlyTransactionMethodSuccess(YearMethodTransactionRequest) returns (ApiResponseTransactionYearPaymentmethod);
    rpc GetMonthlyTransactionMethodFailed(MonthMethodTransactionRequest) returns (ApiResponseTransactionMonthPaymentMethod);
    rpc GetYearlyTransactionMethodFailed(YearMethodTransactionRequest) returns (ApiResponseTransactionYearPaymentmethod);
}
